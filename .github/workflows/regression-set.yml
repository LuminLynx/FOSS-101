name: Regression sets (live grader)

# Per docs/RUBRIC_AUDIT.md § Decisions locked: every rubric change requires
# the full regression set to re-run end-to-end against the live grader
# before merging. This workflow enforces that, and adds a workflow_dispatch
# trigger so operators can run regression sets on demand (e.g. after a
# rubric audit or post-Railway-outage verification).
#
# Trigger model:
#   * pull_request — only when content (rubric/units/regression-sets) or
#     grader-relevant infra files change. Touched-only by default;
#     infra-file changes fan out to all sets.
#   * workflow_dispatch — manual; choose 'all' or a comma-separated list.
#
# Cost model: per-pair grade call ≈ $0.009 with prompt-cache hit (per
# docs/PHASE_2_GATE.md). A 21-pair set ≈ $0.20. Touched-only routing
# keeps PR cost bounded; fan-out on infra changes is rare.

on:
  pull_request:
    paths:
      - 'content/units/**'
      - 'content/regression-sets/**'
      - 'backend/app/ai_service.py'
      - 'backend/scripts/run_regression_set.py'
      - 'backend/scripts/ingest_units.py'
      - '.github/workflows/regression-set.yml'
  workflow_dispatch:
    inputs:
      sets:
        description: 'Regression sets to run — "all" or comma-separated basenames (no .yml)'
        required: false
        default: 'all'
      threshold:
        description: 'Per-criterion agreement threshold % (default 80, per PHASE_2_GATE.md)'
        required: false
        default: '80'

concurrency:
  group: regression-set-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regression:
    name: Regression sets (live grader)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: foss101
          POSTGRES_PASSWORD: foss101
          POSTGRES_DB: foss101_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U foss101 -d foss101_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://foss101:foss101@localhost:5432/foss101_test
      AI_PROVIDER_API_KEY: ${{ secrets.AI_PROVIDER_API_KEY }}
      AI_MODEL: claude-sonnet-4-6
      APP_ENV: ci

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2  # need the base sha for PR diffs

      - name: Verify AI_PROVIDER_API_KEY secret is configured
        run: |
          if [ -z "${AI_PROVIDER_API_KEY:-}" ]; then
            echo "::error::AI_PROVIDER_API_KEY is empty. Add it as a repo secret (Settings → Secrets and variables → Actions). Fork PRs will not have access — that is expected."
            exit 1
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Apply database migrations
        run: python -m backend.scripts.migrate_db

      - name: Ingest authored units
        run: python -m backend.scripts.ingest_units content/units/

      - name: Determine regression sets to run
        id: select
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_SETS: ${{ inputs.sets }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          : > sets.txt

          all_sets() {
            find content/regression-sets -maxdepth 1 -name '*.yml' ! -name '_*' | sort
          }

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$DISPATCH_SETS" == "all" || -z "$DISPATCH_SETS" ]]; then
              all_sets > sets.txt
            else
              IFS=',' read -ra NAMES <<< "$DISPATCH_SETS"
              for name in "${NAMES[@]}"; do
                name="${name# }"; name="${name% }"
                f="content/regression-sets/${name}.yml"
                if [[ -f "$f" ]]; then
                  echo "$f" >> sets.txt
                else
                  echo "::warning::Requested set '$name' not found at $f — skipping."
                fi
              done
            fi
          else
            CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
            INFRA_RE='^(backend/app/ai_service\.py|backend/scripts/(run_regression_set|ingest_units)\.py|\.github/workflows/regression-set\.yml)$'
            if echo "$CHANGED" | grep -qE "$INFRA_RE"; then
              echo "Infra file changed — running all regression sets."
              all_sets > sets.txt
            else
              while IFS= read -r path; do
                case "$path" in
                  content/regression-sets/*.yml)
                    base=$(basename "$path")
                    [[ "$base" == _* ]] && continue
                    echo "$path" >> sets.txt
                    ;;
                  content/units/*.md)
                    base=$(basename "$path" .md)
                    [[ "$base" == _* ]] && continue
                    mapped="content/regression-sets/${base}.yml"
                    [[ -f "$mapped" ]] && echo "$mapped" >> sets.txt
                    ;;
                esac
              done <<< "$CHANGED"
              if [[ -s sets.txt ]]; then
                sort -u sets.txt -o sets.txt
              fi
            fi
          fi

          count=$(wc -l < sets.txt | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Selected $count regression set(s):"
          [[ -s sets.txt ]] && cat sets.txt || echo "  (none)"

      - name: Skip if no sets selected
        if: steps.select.outputs.count == '0'
        run: |
          echo "::notice::No regression sets to run for this change."

      - name: Run regression sets against live grader
        if: steps.select.outputs.count != '0'
        env:
          THRESHOLD: ${{ inputs.threshold || '80' }}
        run: |
          set -uo pipefail
          OVERALL=0
          while IFS= read -r set_path; do
            [[ -z "$set_path" ]] && continue
            echo "::group::$set_path  (threshold ${THRESHOLD}%)"
            if python -m backend.scripts.run_regression_set "$set_path" --threshold "$THRESHOLD"; then
              echo "::endgroup::"
            else
              status=$?
              echo "::endgroup::"
              echo "::error file=${set_path}::Regression set failed (exit $status, threshold ${THRESHOLD}%)."
              OVERALL=1
            fi
          done < sets.txt
          exit $OVERALL
