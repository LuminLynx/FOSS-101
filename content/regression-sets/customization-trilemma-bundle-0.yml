  - id: p017
    label: Edge case — pseudocode answer; realigned post-gate to all-three-met (c1 false→true; pseudocode structure + comments = naming per grader-lenient reading)
    answer: |
      def customization_decision(problem):
          if problem.shape == 'behavior_shift':
              # Fine-tuning shifts default behavior;
              # RAG/prompting don't change defaults at scale.
