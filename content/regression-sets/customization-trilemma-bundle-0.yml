  - id: p006
    label: c1 + c2 + c3 met, c4 missing — trilemma frame + failure mode + mechanism, no regime mapping
    answer: |
      These are three different problems, not three flavors of the
      same one. The customization trilemma — fine-tuning vs. RAG
      vs. prompting — only works when you treat the three
      approaches as solving three different problem shapes, not
      as interchangeable levers.

      The eng lead's "pick one" framing collapses what's actually
      a multi-axis decision into a single bet, and that's where
      the money tends to get wasted. Each approach has a specific
      mechanism. Fine-tuning works by shifting the model's
      behavior distribution through additional training; it
      changes defaults but doesn't reliably load facts. RAG works
      by injecting external information into the prompt at query
      time; it adds knowledge without changing model behavior.
      Prompting works by specifying behavior in the call itself;
      cheap and fast but bounded by what instructions and examples
      can convey.

      What that means for the decision: pick the approach whose
      mechanism matches the problem shape, not the one with the
      most budget or the most internal advocacy.
