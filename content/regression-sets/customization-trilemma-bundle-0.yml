  - id: p005
    label: All four met, written in the voice of someone who's been bitten
    answer: |
      I've watched a team make exactly this mistake. They had
      budget for fine-tuning, fine-tuned to solve a knowledge gap,
      and six months later the facts had drifted and they were
      back where they started — minus the training spend.

      The discipline is to diagnose before picking. Three
      problems, three different shapes:

      The tone problem is a behavior issue. The model can answer;
      its default voice is the issue. Fine-tuning works here
      because training literally shifts what the model does when
      no other signal pushes it elsewhere. RAG won't touch tone;
      prompting moves it per call but not in production-grade
      defaults.

      The new-product gap is a knowledge issue. The facts exist;
      the model just hasn't seen them. RAG is the right tool
      because retrieval injects exactly the missing information
      into context for each query, and it doesn't go stale the way
      fine-tuning would (re-index, not retrain).

      The output format problem is a spec issue. The model can do
      the work; we haven't told it precisely what we want. Update
      the prompt with clear format rules and 3-5 examples. Cheap,
      fast, reversible.

      Sequence: prompt fix this week, RAG expansion this month,
      fine-tune for tone next quarter only if a stronger system
      prompt can't get tone close enough. The eng lead's "pick
      one" is the trap — these are not the same problem at scale.
