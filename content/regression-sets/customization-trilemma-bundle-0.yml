pairs:
  - id: p001
    label: All four met, balanced answer addressing each problem
    answer: |
      The eng lead is right that there are three approaches on the
      table but wrong that we pick one. These are three different
      problems with three different shapes, and they map cleanly to
      three different approaches.

      The tone problem is a behavior shift. The model can answer;
      it just defaults to a voice we don't want. That's what
      fine-tuning is for — training on examples of the right tone
      changes the model's defaults. RAG won't help (retrieval
      doesn't change interpretation), and prompting nudges per call
      but doesn't shift defaults at production scale.

      The new-product knowledge gap is a knowledge problem. The
      facts exist in retrievable form (the Confluence docs). RAG
      is the right tool — expand the index. Fine-tuning would be
      wrong here: training shifts behavior distribution but doesn't
      reliably load facts, and six months from now with product
      line #3 we'd be stale again.

      The output-drift problem is a spec problem. The model can do
      the task and knows the facts; it just doesn't know what
      "good" looks like specifically. That's a prompt fix — write
      the format spec clearly, add 3-5 boundary examples.

      Sequence: RAG expansion + prompt rewrite this quarter (cheap,
      reversible); fine-tune for tone next quarter after we've
      established that a stronger system prompt can't get tone
      close enough. Where I'd be willing to be wrong: tone might
      be addressable in prompting alone, worth trying first before
      committing to fine-tuning's reversal cost.
