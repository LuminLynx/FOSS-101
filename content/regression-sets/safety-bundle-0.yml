  - id: p021
    label: c1 + c4 — names the three decisions and maps the guarded-action combination to the money-transfer surface with the PM error (c4 met), but states the constraint only generically ("the pieces have to fit") without the specific mutual constraint, so c3=false (c1/c3-overlap watch-pair)
    answer: |
      Safety is three coupled decisions: what to moderate, how strict
      the threshold is, and where the human sits. They are coupled, so
      the combination is what matters rather than any single choice.

      For this assistant, which can move money, the right combination is
      to moderate both sides, set a careful threshold, and keep a human
      on the transfer, the guarded-action shape. Defaulting to one
      output filter is the usual mistake of treating safety as a single
      toggle.

      If the combination is wrong the feature will generally behave
      badly and feel either unsafe or unusable, because the pieces have
      to fit together and a mismatch produces a worse outcome overall.
      The important part is choosing a combination that matches the
      surface, and a poor match will degrade things in the ways you
      would expect.
