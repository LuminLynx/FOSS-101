  - id: p016
    label: All four met, long-narrative voice
    answer: |
      Let me walk through why running one moderation call on the output
      at the default threshold is the wrong instinct for this assistant,
      because the reasoning is the whole point.

      Adding moderation looks like one decision and is really three, and
      the three are coupled. The first is what to moderate, which can be
      the user's input, the model's output, or both. The second is how
      strict to set the threshold, which is where you choose to sit on
      the trade between over-refusing legitimate use and under-blocking
      harm. The third is where the human sits, which is whether a flagged
      item is auto-blocked, queued for asynchronous review, or routed to
      a person before a high-risk action executes.

      What makes this one coupled decision rather than three independent
      ones is that the choices reinforce or undermine each other. The
      moment you auto-block with no human, the threshold becomes the
      entire defense and has to be set stricter, because there is no
      second line to catch a miss or reverse an over-block. And the
      moment you moderate only the output, you have given up on catching
      an injected instruction that entered through the input, because
      the place the abuse arrived was never inspected.

      This assistant can initiate a money transfer, which makes it a
      guarded-action surface, and the combination that fits is to
      moderate both sides, tune the threshold toward recall, and put a
      human in the loop before the transfer runs. The failure the team
      would ship by following eng's plan is two-fold: the default
      threshold was never set against our own abuse surface, so it
      over-refuses real users into churn, and the output-only placement
      misses the prompt injection that steers the model toward an action
      the output filter does not even classify as harmful. The error
      underneath both is treating safety as a single filter bolted on at
      launch instead of threat-modeling what an adversary does to a
      feature that can act, and then layering proportionate defenses.
    expected:
      criteria:
