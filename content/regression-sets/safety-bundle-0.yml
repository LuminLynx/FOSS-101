  - id: p020
    label: All-missed on-topic — refuses the premise, "don't ship an assistant that can take actions"
    answer: |
      The premise is wrong. We should not ship an AI assistant that can
      take real actions on a user's account at all. Letting a model
      initiate transfers or change settings is asking for trouble no
      content filter can fix, and the safe product is a read-only
      assistant that answers questions and hands the user a link to do
      the action themselves. Push back on the brief: strip the action
      capability, ship the question-answering assistant, and the whole
      moderation question shrinks to filtering text. Trying to make an
      acting assistant safe is solving a problem we created by giving it
      actions in the first place.
