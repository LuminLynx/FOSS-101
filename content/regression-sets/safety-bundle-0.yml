  - id: p005
    label: All four met, been-bitten experiential voice
    answer: |
      I shipped this mistake once. We put a moderation call on the
      output of an assistant at the vendor's default threshold and
      called it done. It demoed clean. In production two things bit
      us: the threshold over-refused a chunk of legitimate requests
      that happened to look risky, so engaged users churned, and a
      crafted input talked the model into a workflow our output filter
      never even looked at because the damage was an action, not a
      sentence.

      That taught me safety here is three coupled decisions. What to
      moderate is the input, the output, or both. How strict the
      threshold is sets where we sit on the over-refusal versus
      under-block trade. Where the human sits is auto-block, flag for
      review, or a human in the loop before a high-risk action. They
      are coupled: once you auto-block with no human, the threshold is
      the whole defense and has to be stricter, and once you moderate
      only one side you have conceded the abuse that enters on the
      other.

      This assistant can move money, so it is a guarded-action surface:
      moderate both, tune for recall, and a human approves the transfer.
      The error is treating safety as a filter you bolt on at the end
      instead of threat-modeling what an adversary does to a feature
      that can take actions. Decide the threshold against a red-team
      set and the human gate on the transfer before launch.
