  - id: p012
    label: All-missed on-topic — "set the threshold to maximum strictness and block everything risky"
    answer: |
      The safest move is to set the moderation threshold as strict as
      it goes. If there is any chance a request or response is harmful,
      block it. Yes we will refuse some legitimate requests, but for a
      financial assistant that is the right trade — better to frustrate
      a few users than to let anything harmful through. Crank the
      sensitivity to maximum on every category, auto-block on any flag,
      and we are covered. We can loosen it later if users complain too
      much, but starting maximally strict is the responsible default
      for a feature that touches money.
