  - id: p010
    label: c2 + c3 met, c1/c4 missing — explains the over-refusal mechanism and the threshold/human constraint, no framing, no map
    answer: |
      The core failure here is over-refusal. If we set the threshold
      strict and auto-block with no human, the feature blocks a real
      fraction of legitimate requests, because a moderation classifier
      trades precision against recall — pushing recall up to catch more
      harm drags precision down, so more good requests get caught in
      the net. Users hit refusals on reasonable asks and stop trusting
      the assistant, which is the safe-but-useless outcome.

      The reason this is not a standalone threshold tweak is that the
      threshold choice is tied to the human-locus choice. With a human
      in the loop you can run a looser threshold, because the human is
      the backstop that catches what slips through. With auto-block and
      no human, the threshold has to carry the whole load and so has to
      be stricter, which is exactly what produces the over-refusal. You
      cannot pick one without the other.
    expected:
