pairs:
  - id: p001
    label: All four met, balanced prose covering the three decisions and the account-assistant stakes
    answer: |
      Legal asking for moderation and eng planning to run the output
      through a provider API at the default threshold is the trap:
      adding a content filter looks like one decision and is three
      coupled ones, and on this surface the combination decides
      whether we ship safe-and-usable, safe-but-useless, or unsafe.

      The first decision is what to moderate: the user's input, the
      model's output, or both. The second is how strict to set the
      threshold, which is where we sit on the over-refusal versus
      under-block trade. The third is where the human sits: auto-block,
      flag for review, or a human in the loop before a high-risk
      action runs. They constrain each other — auto-block with no
      human forces a stricter threshold because every error executes
      unreviewed, and moderating only the output forecloses catching
      an injected instruction that entered at the input.

      This assistant can move money — it can initiate a transfer — so
      it is a guarded-action surface. The right combination is to
      moderate both sides, tune the threshold for recall, and put a
      human in the loop on the transfer. Eng's output-only plan at the
      default threshold leaves two holes. A prompt injection in the
      user's input is never inspected where it enters, so it can steer
      the model toward an action the output filter may not even
      classify as harmful. And the vendor default threshold was never
      tuned to this feature's cost of one incident, which here is an
      erroneously executed transfer. Before launch I want the transfer
      path gated by a human approval and the threshold set against our
      own red-team set, not the default.
    expected:
      criteria:
        - position: 1
          met: true
        - position: 2
          met: true
        - position: 3
          met: true
        - position: 4
          met: true
      flagged: false

