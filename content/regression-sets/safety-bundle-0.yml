    label: All-missed on-topic — "just put a human reviewing everything"
    answer: |
      The simplest safe answer is to have a human review every
      interaction. Put a person in the loop on all of it — every
      response and every action the assistant wants to take gets
      approved by a human before it goes out. That way nothing harmful
      ever reaches a user or executes without a person signing off. Yes
      it is more headcount, but safety is worth it, and we avoid the
      whole question of where to set a threshold because a human is
      always the final check. Staff a review team and route everything
      through them.
