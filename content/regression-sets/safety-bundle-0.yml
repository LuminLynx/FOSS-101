  - id: p008
    label: c2 + c3 met, c1/c4 missing — explains the mechanism and the constraint without framing the three decisions or mapping a combination
    answer: |
      The thing that will bite is the interaction between watching only
      the output and never bounding the threshold with a human. If a
      crafted input talks the model into an action, the output filter
      may never flag it, because the harm is the action and not the
      text, and the input where the abuse entered was never inspected.
      That is an under-block failure, and it is invisible in a demo
