  - id: p003
    label: Off-topic, all missed, gradable, NOT flagged — pivots to PII/privacy/retention governance, off-topic for the *how*
    answer: |
      Before we talk about the feature at all, my real concern is
      that we are about to start collecting photographs of
      people's receipts. That is personal financial data and
      possibly images of payment cards. The questions I want
      answered are how long we retain the uploaded images, where
      they are stored and whether that is region-appropriate,
      whether they are encrypted at rest, what our deletion
      policy is, whether this triggers any regulatory obligation,
      and whether legal has reviewed the consent flow. Until the
      privacy and data-governance story is clear I do not think
      we should be discussing implementation. The technical
      approach matters far less than getting the data-handling
      and compliance posture right first.
