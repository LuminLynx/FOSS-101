    answer: |
      I think the more interesting opportunity here is generating
      images, not just reading them. If we already have vision
      models in the stack, we should look at using them to
      produce a clean, branded visual summary of the expense for
      the user — a generated receipt-style card they can share or
      attach to a report. We could let users prompt for different
      layouts and styles, and the model renders the image. That
      would be a real differentiator. I would scope the
      text-to-image generation work and the prompt controls for
      the visual output rather than spending our time on the
      ingestion side.
