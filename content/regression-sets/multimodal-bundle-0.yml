  - id: p014
    label: All missed on-topic — "build one general CV pipeline that handles every image type"
    answer: |
      I would not use the model for this at all. The right move
      is to build one general computer-vision pipeline that we
      own and that handles every image type the product will ever
      throw at it — receipts today, but also screenshots,
      product photos, charts, whatever comes next. Build it once,
      make it general enough to cover all of them, and we never
      have to think about per-feature image handling again. Eng
      should invest in that one robust pipeline rather than
      calling a model per feature.
