  - id: p019
    label: All missed on-topic — "eval by eyeballing a few samples, vision quality is subjective anyway"
    answer: |
      Sign-off seems straightforward. Send the receipt to the
      vision model, get the fields back, ship it. For quality, we
      just have someone eyeball a few sample outputs before
      release and spot-check occasionally afterwards. Vision
      quality is fairly subjective anyway, so there is not much
      point trying to put hard numbers on it; a human glancing at
      a handful of receipts tells you everything you need to
      know. No special pipeline, no formal evaluation, just a
      sanity check and go.
