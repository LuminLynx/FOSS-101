  - id: p015
    label: All missed on-topic — "image-token cost is negligible at our scale, ignore it"
    answer: |
      I looked at the plan and I think it is fine to ship as is.
      The only thing people worry about with vision is cost, and
      at our scale image-token cost is negligible — we are
      talking fractions of a cent per receipt against a
      transaction worth far more. So there is no real reason to
      build extraction or a fallback path; that engineering would
      cost more than the tokens ever will. Send the image to the
      model, parse the result, move on. Cost is simply not a
      factor here.
