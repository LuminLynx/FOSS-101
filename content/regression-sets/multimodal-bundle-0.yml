pairs:
  - id: p001
    label: All three met, balanced prose covering the three approaches and the receipt shape
    answer: |
      Eng saying the model is good enough to read a receipt is
      the trap. The question is not whether the model can see the
      image, every frontier model can. The question is the shape
      of this visual task, and that should be diagnosed before
      any approach is picked rather than reaching for the most
      capable model by default.

      There are three approaches. The first is sending the raw
      image to a vision model, which is right for open-ended
      visual understanding where the input is unbounded. The
      second is extracting a structured signal first with OCR or
      classical CV, which is right for stable, well-defined
      extraction. The third is a hybrid where a cheap extractor
      handles the common case and a VLM falls back on
      low-confidence inputs, which is right for high-volume tasks
      that are mostly stable with a long tail.

      Receipt auto-fill is that third shape. Most receipts are
      standard, a small tail are crumpled, angled, or
      handwritten. So the approach is a hybrid: OCR for the 95
      percent, VLM fallback on the weird 5 percent, because the
      shape drives the choice. The failure of the
      send-it-to-the-VLM instinct is concrete: image input is
      billed in tokens proportional to resolution, so a
      high-detail receipt photo is a distinct and often dominant
      cost line, and the free-text output is hard to eval, so we
      would overpay per receipt and lose the ability to measure
      extraction accuracy for zero capability gain over OCR on
      the standard case. Before launch I want the task shape
      classified, the fallback threshold and its precision and
      recall agreed, and cost-per-image measured at the
      resolution we actually send.
