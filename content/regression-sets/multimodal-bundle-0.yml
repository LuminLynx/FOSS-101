  - id: p016
    label: All three met, long narrative voice
    answer: |
      Let me walk through how I would scope this rather than sign
      off on the plan as stated. Eng wants to send each receipt
      image to the vision model and parse the result, and the
      justification is that the model is good enough to read a
      receipt. That justification is the trap, because every
      frontier model can see an image; the real work is figuring
      out the shape of this particular visual task before any
      approach is chosen, instead of reaching for the most
      capable model by reflex.

      I see three approaches and I want them named explicitly.
      The first is handing the raw image to a vision model, which
      earns its cost when the task is open-ended understanding,
      reasoning over arbitrary, unbounded visual input. The
      second is extracting a structured signal first using OCR or
      classical computer vision, which is the right tool when the
      task is stable and well defined, the same fields in roughly
      the same place every time. The third is a hybrid, where a
      cheap deterministic extractor handles the bulk of inputs
      and a VLM is the fallback only on low-confidence cases,
      which fits a task that is high volume and mostly stable but
      carries a long tail of awkward inputs.

      Receipt auto-fill is the third shape almost exactly. The
      overwhelming majority of receipts are printed and
      legible and yield to OCR; a minority are crumpled,
      photographed at an angle, faded, or handwritten. So the
      approach the shape selects is the hybrid, and it is the
      shape that selects it, not the desire to use the strongest
      model. The mechanism behind why the eng plan operates badly
      is specific. Image input is billed in tokens that scale
      with resolution and detail, so a high-detail receipt photo
      is a distinct and frequently dominant cost line per
      transaction, and a VLM's free-text output over arbitrary
      receipt photos is hard to evaluate without a second grader
      or a human. So sending every receipt to the VLM means we
      overpay on the 95 percent OCR would have handled for cents
      and we simultaneously lose the ability to measure how
      accurate extraction actually is, all for zero capability
      gain on the standard case. What I want decided before
      launch is the explicit shape classification, the fallback
      confidence threshold together with its precision and recall
      targets, and a measured cost-per-image at the resolution we
      will really send rather than the provider default.
