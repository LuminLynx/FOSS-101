  - id: p012
    label: All missed on-topic — "OCR is legacy, modern VLMs replaced it, always use the VLM"
    answer: |
      OCR is legacy technology at this point. Modern
      vision-language models have effectively replaced it; a good
      VLM reads a receipt better than Tesseract ever did and it
      handles handwriting and bad lighting that classical OCR
      chokes on. The right default in 2026 is to always use the
      VLM for any image task, full stop, and treat anything
      classical as technical debt we should be removing, not
      adding. So eng's plan is correct and I would not introduce
      an extraction stage at all.
