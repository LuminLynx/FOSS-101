  - id: p004
    label: All missed on-topic — "send every image to the VLM, frontier models are smart enough, skip the pipeline"
    answer: |
      Honestly I think eng's plan is the right one and we are
      overcomplicating this. Frontier vision models are smart
      enough now that you do not need a pipeline in front of
      them. Just send the receipt image to the model, ask for the
      fields back as JSON, and parse it. Building OCR or any kind
      of preprocessing is the sort of thing we did years ago
      because the models were weak; that is not the world we are
      in anymore. We should sign off, ship the simple version,
      and only revisit it if something actually breaks.
