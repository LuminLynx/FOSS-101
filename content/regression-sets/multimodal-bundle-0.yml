  - id: p010
    label: c2 only — explains the mismatch mechanism and cost/eval consequence with no three-approach framework, no mapping, no PM error
    answer: |
      My concern with the plan is the economics and the
      measurability, not the model's ability. Image input is
      billed in tokens roughly proportional to resolution and
      detail, so a high-detail receipt photo is a distinct and
      often dominant cost line per transaction, not a rounding
      error. On top of that, a vision model's output here is free
      text over arbitrary receipt photos, which is hard to
      evaluate without a second model or a human in the loop, so
      you do not actually know how often it is wrong.

      Put those together and the mechanism of the mismatch is
      clear: running a heavy vision model on something a cheap
      deterministic extractor could handle means you overpay on
      every call and you lose evaluability, for no capability you
      actually needed. And the inverse mismatch is just as real:
      a rigid extraction pipeline pointed at genuinely open-ended
      visual input does not degrade gracefully, it simply fails
      on anything outside the distribution it was built for.
      Those two failure mechanisms are what I want understood
      before we commit.
