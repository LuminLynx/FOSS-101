    answer: |
      I think the team is at risk of over-engineering this.
      Hybrid approaches and fallback routing are premature
      optimization for a v1 feature — that is the kind of thing
      you build after you have a scale problem, not before. Just
      pick one thing, the vision model, since eng already wants
      it, and move on. We can always add complexity later if the
      numbers force us to. For now the simplest possible path is
      the correct one and we should not be debating task shapes
