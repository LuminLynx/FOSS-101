  - id: p008
    label: Partial credit (c2+c3) — explains the mismatch mechanism and the constraint, but never frames the three decisions (c1) or maps a combination to the task (c4)
    answer: |
      The thing that will bite is the interaction between letting the
      model run its own loop and never bounding it. If the model
      decides its own next step and also decides when it is done,
      nothing stops a run from compounding: each step has some error
      rate, and because end-to-end reliability is the product of the
      per-step rates, an unchecked four or five step run drifts well
      below the per-step number, while the cost climbs with every
      extra turn because there is no ceiling on how long it goes.

      The deeper point is that these are not independent settings.
      Once you hand the loop to the model, you have implicitly
      committed to a real termination guard, because the model is
      exactly the component that cannot reliably tell whether the
      goal is met. And letting errors compound is only safe on a
      short, fixed sequence; the longer and more model-directed the
      loop, the more per-step validation stops being optional. The
      leniency in one choice forces rigor in another.
