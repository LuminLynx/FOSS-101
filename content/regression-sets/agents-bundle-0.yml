      the goal is met. The third is where errors are caught, which is
      either letting them compound, validating each step, or checking
      only the end state. These are coupled because a model-directed
      loop forces a real termination guard, since the model cannot be
      trusted to stop itself, and compounding error is only survivable
      on a short fixed workflow.

      The recommended combination for this task is a fixed workflow
      with a step budget and per-step validation, the
      reliable-pipeline shape, because the deal-desk steps are
      knowable in advance and each one is checkable. The rationale
      for not letting the model figure out the steps is that the
      task is a fixed workflow wearing an agent costume, and building
      the loop anyway is the expensive theater: reliability is the
      product of per-step reliability so an unchecked run drifts
      below its per-step rate, and cost scales with step count so an
      unbounded loop has no ceiling. The risk if this analysis is
