pairs:
  - id: p001
    label: All four met, balanced prose covering the three decisions and the deal-desk task shape
    answer: |
      Eng saying give the model the tools and let it figure out the
      steps is the trap. Building an agent here is not one decision
      but three coupled ones, and the combination is what decides
      whether this is a reliable pipeline or expensive theater.

      The first decision is how much to decompose: a single call, a
      fixed workflow we design in advance, or a model-directed loop
      that picks its own next step. The second is how the loop
      terminates: a fixed step budget, the model judging itself done,
      or an external verifier that checks the goal is actually met.
      The third is where errors are caught: let them compound,
      validate each step, or check only the end state. These
      constrain each other — a model-directed loop forces a real
      termination guard because the model cannot be trusted to stop
      itself, and compounding error is only survivable on a short
      fixed workflow.

      The deal-desk task has knowable steps: pull the contract
      history, check the current pricing rules, flag non-standard
      terms, draft the approval summary. That shape is a fixed
      workflow with a step budget and per-step validation, the
      reliable-pipeline combination, not a model-directed loop. The
      failure eng would ship by letting the model figure out the
      steps is the expensive theater: end-to-end reliability is the
      product of per-step reliability, so four 90-percent steps land
      around 66 percent end-to-end, and an unbounded loop has no cost
      ceiling — it can wander through a dozen tool calls toward a
      wrong summary and bill for every one. Before launch I want the
      termination guard and the per-step validation decided
      explicitly, because neither shows up in the clean-opportunity
      demo.
    expected:
      criteria:
