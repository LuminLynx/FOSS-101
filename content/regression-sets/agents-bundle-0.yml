    answer: |
      We do not need to validate every intermediate step. That is
      expensive and slow. The simpler design is to let the assistant
      run the whole task and then check the final approval summary
      before it goes to finance. If the end state looks right, the
      intermediate steps were right; if it looks wrong, we re-run.
      One check at the end is much cheaper than a check after every
      tool call, and it catches the only thing that matters, which is
      whether the summary is correct. Validate the output, not the
      process.
