  - id: p012
    label: All-missed on-topic — "always model-directed, fixed workflows are legacy"
    answer: |
      The whole point of using an agent is to let the model handle
      the planning, so a model-directed loop is the right call here.
      Hard-coding a fixed workflow is the legacy way of doing this —
      it is brittle and breaks the moment a deal does not fit the
      script. If we let the model decide its own steps it will adapt
      to non-standard opportunities automatically, which is exactly
      the hard case. I would give it the tools, a clear goal, and let
      it run until it is confident it has the summary. Fixed
      workflows are a step backward when the model can orchestrate
      itself.
