  - id: p003
    label: Off-topic, gradable, pivots to Unit 15 governance — should an agent touch deals at all
    answer: |
      Before we design any loop, the real question is whether a
      model should be drafting finance-facing approval summaries on
      live deals at all. A wrong pricing concession or a missed
      non-standard term is a revenue and compliance exposure, and
      that is a governance call, not an engineering one. I would want
      deal-desk leadership and finance to decide whether a human
      signs off on every summary regardless of how the assistant is
      built, and I would lean toward a mandatory human approval gate
      on anything that moves a number. The internal architecture is
      secondary to that authorization decision.
