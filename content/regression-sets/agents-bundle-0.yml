  - id: p005
    label: All four met, been-bitten experiential voice
    answer: |
      I shipped this mistake once. We gave a research assistant a
      goal and a set of tools and let it decide its own steps, with
      the model declaring when it was done. It demoed like magic. In
      production it would occasionally decide it needed just one more
      lookup, then another, and we had runs that burned thirty tool
      calls and a few dollars each wandering toward an answer that
      was wrong anyway.

      That taught me an agent is three coupled decisions. How much to
      decompose runs from a single call to a fixed workflow to a
      model-directed loop. How it terminates runs from a fixed step
      budget to model self-assessment to an external verifier. Where
      errors are caught runs from letting them compound to per-step
      validation to an end-state check. They are coupled, because the
      moment you let the model direct the loop you have committed to
      a real termination guard, since the model is the worst judge of
      whether it is finished, and compounding error is only tolerable
      on a short fixed sequence.

      The deal-desk task is a fixed workflow wearing an agent
      costume. The steps are knowable in advance, so the right shape
      is a fixed workflow with a step budget and per-step validation,
      the reliable-pipeline combination. The expensive-theater
      failure is real here: reliability is the product of per-step
      reliability, so an unchecked four-step run is well under its
      per-step rate, and an unbounded loop has no cost ceiling. The
      termination and validation decisions are the ones nobody makes
      until an incident makes them.
