  - id: p010
    label: Single criterion (c2) — explains the compounding-error and runaway-cost mechanism and gestures at the constraint, but never frames the three decisions or maps a combination
    answer: |
      The core thing that goes wrong is that a model-directed loop
      with nothing bounding it gets both less reliable and more
      expensive the longer it runs. Reliability across a sequence is
      roughly the product of the per-step reliabilities, so a step
      that is ninety percent reliable run five times with no
      intermediate check lands around fifty-nine percent end-to-end —
      a feature that works in the one-step demo and fails two times
      in five in production. The cost moves the same way: every loop
      turn is a model call plus a tool round-trip, the latency is
      serialized so the user waits for the sum, and with no step
      budget there is no ceiling on either. And the reason this is
      hard to bolt on afterward is that the looseness and the
      bounding are entangled — once the model directs the loop, only
      a guard outside the model can decide it is actually done.
