  - id: p016
    label: All four met, long-narrative voice
    answer: |
      Let me walk through why letting the model figure out the steps
      is the wrong instinct for the deal-desk assistant, because the
      reasoning is the whole point.

      Building an agent looks like one decision and is really three,
      and the three are coupled. The first is how much to decompose,
      which ranges from a single call, to a fixed workflow we lay out
      in advance, to a model-directed loop that chooses its own next
      action each turn. The second is how the loop terminates, which
      ranges from a fixed budget on the number of steps, to the model
      declaring itself done, to an external verifier that checks
      whether the goal was actually met. The third is where errors
      are caught, which ranges from letting them compound, to
      validating each step before the next consumes it, to checking
      only the final result.

      What makes this one coupled decision rather than three
      independent ones is that the choices reinforce or undermine
      each other. The moment you let the model direct the loop, you
      have committed to a real termination guard, because the model
      is precisely the component that cannot be trusted to know when
      it is finished. And letting errors compound is only survivable
      on a short fixed sequence; the longer and more model-directed
      the loop, the more per-step validation stops being optional.

      The deal-desk task has knowable steps. Pull the account's
      contract history, check the current pricing rules, flag any
      non-standard terms, and draft the approval summary. That is a
      fixed workflow with a step budget and per-step validation, the
      reliable-pipeline shape, not a model-directed loop. The failure
      the team would ship by inheriting the loop is the expensive
      theater: end-to-end reliability is the product of the per-step
      rates, so an unchecked multi-step run drifts well below its
      per-step reliability, and an unbounded loop has no cost ceiling,
      so it can wander through many tool calls toward a wrong summary
      and bill for all of them. The termination and error-catching
      decisions are the ones that never get made until an incident
      makes them, because the clean-opportunity demo never runs long
      enough to drift.
